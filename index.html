<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<meta name="format-detection" content="telephone=no" />
		<meta name="theme-color" content="#111327" />
		<title>GPX Navigator</title>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		/>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.css"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div id="app">
			<!-- Upload Section -->
			<div id="upload-section" class="section">
				<div class="upload-container">
					<h1>GPX Navigator</h1>
					<p>Choose a preset route or upload your own GPX file</p>

					<!-- Preset Routes -->
					<div class="preset-routes">
						<h3>Preset Routes</h3>
						<div id="route-grid" class="route-grid">
							<!-- Routes will be loaded here dynamically -->
						</div>
					</div>

					<div class="divider">
						<span>OR</span>
					</div>

					<!-- Custom Upload -->
					<div class="custom-upload">
						<input type="file" id="gpx-file-input" accept=".gpx" />
						<label for="gpx-file-input" class="upload-button"
							>Upload Your Own GPX</label
						>
						<div id="file-info"></div>
					</div>
				</div>
			</div>

			<!-- Location Permission Modal -->
			<div id="location-modal" class="modal hidden">
				<div class="modal-content">
					<div class="modal-icon">
						<svg
							width="48"
							height="48"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
							<circle cx="12" cy="10" r="3"></circle>
						</svg>
					</div>
					<h2>Location Access Required</h2>
					<p>This app needs access to your location to provide GPS navigation.</p>
					<p class="modal-note">Your location data never leaves your device.</p>
					<button id="enable-location-btn" class="modal-button primary">
						Enable Location
					</button>
					<button id="cancel-location-btn" class="modal-button secondary">
						Cancel
					</button>
				</div>
			</div>

			<!-- Navigation Section -->
			<div id="navigation-section" class="section hidden">
				<!-- Map Container -->
				<div id="map"></div>

				<!-- Navigation UI -->
				<div id="nav-ui">
					<div id="status-bar">
						<div id="status-text">Waiting for GPS...</div>
						<div id="distance-info"></div>
					</div>
					<div class="control-buttons-container">
						<button
							id="toggle-preview-button"
							class="control-button with-label"
							title="Show/hide full route preview"
						>
							<svg
								width="20"
								height="20"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
								<circle cx="12" cy="12" r="3"></circle>
							</svg>
							<span class="button-label">Preview</span>
						</button>
						<button
							id="toggle-rotation-button"
							class="control-button with-label"
							title="Change map rotation mode"
						>
							<svg
								width="20"
								height="20"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<circle cx="12" cy="12" r="10"></circle>
								<polygon points="12,2 10,8 14,8"></polygon>
							</svg>
							<span class="button-label">Compass</span>
						</button>
						<button
							id="center-button"
							class="control-button primary with-label"
							title="Recenter map on your location"
						>
							<svg
								width="20"
								height="20"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<circle cx="12" cy="12" r="10"></circle>
								<circle cx="12" cy="12" r="3"></circle>
							</svg>
							<span class="button-label">Recenter</span>
						</button>
						<button
							id="reset-button"
							class="control-button with-label danger"
							title="End navigation and choose new route"
						>
							<svg
								width="20"
								height="20"
								viewBox="0 0 24 24"
								fill="none"
								stroke="currentColor"
								stroke-width="2"
							>
								<line x1="18" y1="6" x2="6" y2="18"></line>
								<line x1="6" y1="6" x2="18" y2="18"></line>
							</svg>
							<span class="button-label">Exit</span>
						</button>
					</div>
				</div>
			</div>
		</div>

		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
		<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
		<script src="app.js"></script>
	</body>
</html>
