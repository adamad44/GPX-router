<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>GPX Navigation App</title>
		<link
			href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="style.css" />
		<script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
		/>
	</head>
	<body>
		<div id="map"></div>

		<!-- Status banner -->
		<div id="statusBanner">
			<span id="statusText">Awaiting GPX upload</span>
			<div id="modeToggle" class="mode-toggle">
				<button id="modeBtn" class="mode-btn" title="Switch to Pinpoint Mode">
					<i class="fas fa-map-pin"></i>
					<span class="mode-label">GPX Mode</span>
				</button>
			</div>
		</div>
		<!-- Floating buttons container -->
		<div class="floating-buttons">
			<button id="uploadBtn" class="floating-btn" title="Upload GPX file">
				<i class="fas fa-upload"></i>
			</button>
			<button id="centerBtn" class="floating-btn" title="Re-center map">
				<i class="fas fa-location-arrow"></i>
			</button>
		</div>

		<!-- Hidden file input -->
		<input type="file" id="gpxFileInput" accept=".gpx" style="display: none" />

		<script src="app.js"></script>
	</body>
</html>
