<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>GPX Navigator</title>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		/>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.css"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div id="app">
			<!-- Upload Section -->
			<div id="upload-section" class="section">
				<div class="upload-container">
					<h1>GPX Navigator</h1>
					<p>Choose a preset route or upload your own GPX file</p>

					<!-- Preset Routes -->
					<div class="preset-routes">
						<h3>Preset Routes</h3>
						<div id="route-grid" class="route-grid">
							<!-- Routes will be loaded here dynamically -->
						</div>
					</div>

					<div class="divider">
						<span>OR</span>
					</div>

					<!-- Custom Upload -->
					<div class="custom-upload">
						<input type="file" id="gpx-file-input" accept=".gpx" />
						<label for="gpx-file-input" class="upload-button"
							>Upload Your Own GPX</label
						>
						<div id="file-info"></div>
					</div>
				</div>
			</div>

			<!-- Location Permission Modal -->
			<div id="location-modal" class="modal hidden">
				<div class="modal-content">
					<div class="modal-icon">
						<svg
							width="48"
							height="48"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
							<circle cx="12" cy="10" r="3"></circle>
						</svg>
					</div>
					<h2>Location Access Required</h2>
					<p>This app needs access to your location to provide GPS navigation.</p>
					<p class="modal-note">Your location data never leaves your device.</p>
					<button id="enable-location-btn" class="modal-button primary">
						Enable Location
					</button>
					<button id="cancel-location-btn" class="modal-button secondary">
						Cancel
					</button>
				</div>
			</div>

			<!-- Navigation Section -->
			<div id="navigation-section" class="section hidden">
				<!-- Map Container -->
				<div id="map"></div>

				<!-- Navigation UI -->
				<div id="nav-ui">
					<div id="status-bar">
						<div id="status-text">Waiting for GPS...</div>
						<div id="distance-info"></div>
					</div>
					<button
						id="toggle-preview-button"
						class="control-button"
						title="Toggle route preview"
					>
						<svg
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
							<circle cx="12" cy="12" r="3"></circle>
						</svg>
					</button>
					<button
						id="toggle-rotation-button"
						class="control-button"
						title="Heading-up mode (map rotates)"
					>
						<svg
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="12" cy="12" r="10"></circle>
							<polygon points="12,2 10,8 14,8"></polygon>
						</svg>
					</button>
					<button
						id="center-button"
						class="control-button"
						title="Center on my location"
					>
						<svg
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<circle cx="12" cy="12" r="10"></circle>
							<circle cx="12" cy="12" r="3"></circle>
						</svg>
					</button>
					<button id="reset-button" class="control-button" title="Upload new GPX">
						<svg
							width="24"
							height="24"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
						>
							<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
							<path d="M21 3v5h-5"></path>
							<path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
							<path d="M3 21v-5h5"></path>
						</svg>
					</button>
				</div>
			</div>
		</div>

		<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
		<script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
		<script src="https://unpkg.com/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
		<script src="app.js"></script>
	</body>
</html>
